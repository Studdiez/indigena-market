name: Tourism Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  tourism-quality:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      NODE_ENV: test
      PORT: 5000
      MONGO_URI: mongodb://127.0.0.1:27017/indigena_ci
      REDIS_URL: redis://127.0.0.1:6379
      USER_ACTION_SECRET: ci-user-action-secret
      USER_JWT_SECRET: ci-user-jwt-secret
      ADMIN_ACTION_SECRET: ci-admin-action-secret
      REQUIRE_SIGNED_USER_ACTIONS: "true"
      REQUIRE_JWT_USER_AUTH: "false"
      REQUIRE_REDIS_RATE_LIMIT: "true"
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:5000/api
      NEXT_PUBLIC_ALLOW_TOURISM_MOCKS: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend deps
        run: npm install --no-fund --no-audit

      - name: Install frontend deps
        run: npm install --no-fund --no-audit
        working-directory: global-market

      - name: Start API server
        run: |
          nohup node server.js > server.log 2>&1 &
          for i in {1..40}; do
            if curl -sf http://127.0.0.1:5000/healthz >/dev/null; then
              echo "server ready"
              exit 0
            fi
            sleep 2
          done
          echo "server failed to start"
          cat server.log
          exit 1

      - name: Build frontend
        run: npm run build
        working-directory: global-market

      - name: Run tourism e2e
        run: npm run test:e2e:tourism

      - name: Run tourism concurrency e2e
        run: npm run test:e2e:tourism:concurrency
